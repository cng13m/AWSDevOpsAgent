name: terraform-drift

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_READONLY }}

      - name: Terraform init
        run: >
          terraform -chdir=terraform/envs/${{ matrix.environment }} init
          -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"
          -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"
          -backend-config="region=${{ vars.AWS_REGION }}"
          -backend-config="key=${{ matrix.environment }}/terraform.tfstate"

      - name: Terraform drift plan
        shell: bash
        run: |
          set +e
          terraform -chdir=terraform/envs/${{ matrix.environment }} plan -detailed-exitcode -no-color -input=false
          EXIT_CODE=$?
          if [ "$EXIT_CODE" -eq 1 ]; then
            exit 1
          fi
          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "Drift detected for ${{ matrix.environment }}"
          else
            echo "No drift for ${{ matrix.environment }}"
          fi
